services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  rest-server:
    build:
      context: .
      dockerfile: rest/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  grpc-server:
    build:
      context: .
      dockerfile: grpc_service/Dockerfile
    ports:
      - "50051:50051"
      - "9091:9091"
    volumes:
      - ./shared:/app/shared
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  graphql-server:
    build:
      context: .
      dockerfile: graphql_service/Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./shared:/app/shared
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  amqp-consumer:
    build:
      context: .
      dockerfile: amqp_service/Dockerfile
    command: ["python", "consumer.py"]
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  kafka-consumer:
    build:
      context: .
      dockerfile: kafka_service/Dockerfile
    command: ["python", "consumer.py"]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  locust:
    build:
      context: .
      dockerfile: load_tests/Dockerfile
    ports:
      - "8089:8089"
    command: ["locust", "-f", "locustfile_all.py", "--class-picker"]
    volumes:
      - ./load_tests/locustfile_all.py:/app/locustfile_all.py
      - ./load_tests/locustfile_rest.py:/app/locustfile_rest.py
      - ./load_tests/locustfile_grpc.py:/app/locustfile_grpc.py
      - ./load_tests/locustfile_graphql.py:/app/locustfile_graphql.py
      - ./load_tests/locustfile_amqp.py:/app/locustfile_amqp.py
      - ./load_tests/locustfile_kafka.py:/app/locustfile_kafka.py
      - ./load_tests/run_all_scenarios.sh:/app/run_all_scenarios.sh
      - ./shared:/app/shared
      - ./results:/app/results
    depends_on:
      - rest-server
      - grpc-server
      - graphql-server
      - rabbitmq
      - kafka
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
